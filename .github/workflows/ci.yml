name: arc-ci

# ADR-0007 (+ macOS amendment): arc's self-tests run on ubuntu + windows (Git Bash)
# + macos-latest. Red = no merge. The macOS leg exercises BSD userland (sed/stat/date
# differ from GNU); bash-3.2 syntax is enforced by a static audit (no mapfile / assoc
# arrays). Scanner-dependent tests skip (visibly) when a tool doesn't install, so CI is
# honest and never flaky on a tool hiccup.
#
# CI runs ONCE per change, on the PULL REQUEST -- not again on the merge to main. The
# earlier `push: branches:[main]` trigger re-ran the whole 6-job matrix on every merge, a
# third pass over a tree the PR had already proven green ("stop paying for it twice",
# d53daed). The `pull_request` trigger already covers every push to an open PR (opened +
# synchronize), so a fix pushed to a red PR re-runs; a clean merge does not. This matches
# the repo's own branch-then-PR rule (CLAUDE.md) -- nothing lands on main except through a
# PR that CI has already gated.
# NOTE (owner action, GitHub UI): turn on branch protection for `main` with "require the
# arc-ci checks to pass" + "require branches to be up to date before merging". The second
# option closes the one gap this leaves -- if main moves between a PR going green and its
# merge, it forces the PR to re-run against the new base, so the merged tree is always a
# tested tree. On a solo repo main rarely moves mid-merge, so the gap is small, but the
# setting makes it zero. I cannot set branch protection from here.

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  selftest:
    strategy:
      fail-fast: false
      matrix:
        # Three OSes on one Node, plus two Node legs on ubuntu. Cycle 2 needs the version
        # dimension: node:sqlite exists only on Node 22+, and ADR-0024 makes it an OPTIONAL
        # accelerator behind an equivalence gate. Both halves of that promise need a runner:
        # Node 18 proves the canonical JSONL-scan path stands alone (REQ-04(b)), Node 22
        # proves the accelerator is byte-identical to it. A full 3x3 matrix would be nine
        # jobs to establish something two ubuntu jobs already settle.
        include:
          - { os: ubuntu-latest,  node: '20' }
          - { os: windows-latest, node: '20' }
          - { os: macos-latest,   node: '20' }
          - { os: ubuntu-latest,  node: '18' }
          - { os: ubuntu-latest,  node: '22' }
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash          # Git Bash on windows-latest -- matches the target runtime
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install bats
        run: npm install -g bats

      - name: Install jq (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install jq (Windows)
        if: runner.os == 'Windows'
        run: choco install jq -y --no-progress

      - name: Install jq (macOS)
        if: runner.os == 'macOS'
        run: command -v jq >/dev/null 2>&1 || brew install jq

      - name: Install gitleaks (best-effort)
        run: |
          set -u
          VER=8.30.1
          mkdir -p "$HOME/bin"
          arch=x64; [ "$(uname -m)" = "arm64" ] && arch=arm64
          if [ "$RUNNER_OS" = "Windows" ]; then
            curl -fsSL -o gl.zip "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_windows_x64.zip" \
              && unzip -o gl.zip gitleaks.exe -d "$HOME/bin" || echo "gitleaks install skipped"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            curl -fsSL -o gl.tgz "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_darwin_${arch}.tar.gz" \
              && tar -xzf gl.tgz -C "$HOME/bin" gitleaks || echo "gitleaks install skipped"
          else
            curl -fsSL -o gl.tgz "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
              && tar -xzf gl.tgz -C "$HOME/bin" gitleaks || echo "gitleaks install skipped"
          fi
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Install opengrep (best-effort)
        run: |
          set -u
          mkdir -p "$HOME/bin"
          base=https://github.com/opengrep/opengrep/releases/latest/download
          if [ "$RUNNER_OS" = "Windows" ]; then
            curl -fsSL -o "$HOME/bin/opengrep.exe" "$base/opengrep_windows_x86.exe" || echo "opengrep install skipped"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            asset=opengrep_osx_x86; [ "$(uname -m)" = "arm64" ] && asset=opengrep_osx_arm64
            curl -fsSL -o "$HOME/bin/opengrep" "$base/$asset" \
              && chmod +x "$HOME/bin/opengrep" || echo "opengrep install skipped"
          else
            curl -fsSL -o "$HOME/bin/opengrep" "$base/opengrep_manylinux_x86" \
              && chmod +x "$HOME/bin/opengrep" || echo "opengrep install skipped"
          fi
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Tool banner
        run: |
          echo "jq:       $(command -v jq       || echo MISSING)"
          echo "bats:     $(command -v bats     || echo MISSING)"
          echo "gitleaks: $(command -v gitleaks || echo MISSING)"
          echo "opengrep: $(command -v opengrep || echo MISSING)"

      - name: Version gate
        run: bash .claude/scripts/review/arc-scan/version-gate.sh

      - name: Product manifests lint
        # Had no CI step at all, so REQ-03's gate only ever ran against tests/fixtures/ --
        # "product-lint green" was in the Phase-03 checkpoint contract but unenforced.
        run: node .claude/scripts/core/product-lint.mjs

      - name: Run bats self-tests
        # -r is kept although ADR-0021 decided tests stay centralised in tests/: bats does
        # not recurse without it, and on a directory holding no *.bats it prints 1..0 and
        # exits 0 -- a moved-away suite would vanish from a green CI without a word.
        run: bats -r --print-output-on-failure tests/

      - name: Test-count floor
        # A suite that silently shrinks is the failure mode -r alone cannot catch. Raise this
        # number when tests are added; never lower it to make a red build green.
        # Counted by grep, not `bats -r --count`: measured on the windows leg that call cost
        # 67s (it loads and parses every file through bats itself) for a number grep produces
        # in 157ms. A gate must not cost more than what it guards.
        shell: bash
        run: |
          n="$(grep -rhc '^@test ' tests/ --include='*.bats' | awk '{s+=$1} END{print s}')"
          echo "discovered $n test(s)"
          [ "$n" -ge 318 ] || { echo "::error::test count $n fell below the floor of 318"; exit 1; }

  # CI tier (ADR-0006): the pinned arc-tools image runs the heavy verifiers.
  # Linux-only (docker; ZAP later is linux-only too). Proves the trivy docker
  # rung against the REAL image -- a genuinely vulnerable dependency must be
  # caught (the native rung + the fake-docker rung are covered by bats).
  ci-tier:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Build the arc-tools image
        run: bash .claude/scripts/review/arc-tools-image.sh build

      - name: Verify trivy runs inside the image
        run: bash .claude/scripts/review/arc-tools-image.sh verify

      - name: Trivy docker rung catches a real vulnerable dependency
        run: |
          set -euo pipefail
          REF="$(bash .claude/scripts/review/arc-tools-image.sh ref)"
          fx="$(mktemp -d)"
          # PyYAML 5.1 -> CVE-2020-1747 (well-known, stable in the trivy DB).
          printf 'PyYAML==5.1\n' > "$fx/requirements.txt"
          # The image runs as non-root (uid 10001); mktemp -d is 0700, so make the
          # mounted fixture world-readable or the container user can't read /src.
          # (Real repo checkouts are already world-readable -- fixture-only fix.)
          chmod -R a+rX "$fx"
          out="$(mktemp)"
          ARC_DOCKER_IMAGE="$REF" ARC_FORCE_RUNTIME=docker ROOT="$fx" \
            bash .claude/scripts/review/arc-scan/adapters/trivy.sh /dev/null "$out"
          n="$(jq '[.runs[].results[]?] | length' "$out")"
          echo "trivy (real image) reported $n vulnerability finding(s)"
          if [ "$n" -eq 0 ]; then
            echo "::warning::0 findings -- mount/readability diagnostic:"
            docker run --rm -v "$fx:/src:ro" "$REF" sh -c 'id; ls -la /src; cat /src/requirements.txt || echo CANNOT-READ-SRC' || true
          fi
          jq -r '.runs[].results[]?.ruleId' "$out" | sort -u | head
          [ "$n" -gt 0 ] || { echo "expected >=1 finding from a vulnerable dep"; exit 1; }
